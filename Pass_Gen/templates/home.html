<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Password Generator</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e1e2f, #2c2c54);
    }

    .card {
      background: #ffffff;
      padding: 35px;
      width: 380px;
      border-radius: 15px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      font-weight: 600;
      color: #333;
    }

    p {
      font-size: 14px;
      color: #777;
      margin-bottom: 25px;
    }

    label {
      font-size: 14px;
      font-weight: 500;
      display: block;
      margin-bottom: 5px;
      text-align: left;
    }

    select {
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #ddd;
      margin-bottom: 20px;
    }

    .options {
      text-align: left;
      margin-bottom: 20px;
    }

    .options label {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .options input {
      margin-right: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 25px;
      background: #4b7bec;
      color: white;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #3867d6;
      transform: scale(1.05);
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>🔐 Password Generator</h1>
    <p>Create secure passwords instantly</p>

    <form action="{% url 'Pass_GenR' %}" method="GET">

      <label>Password Length</label>
      <select name="length">
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
        <option value="9">9</option>
        <option value="10" selected>10</option>
        <option value="11">11</option>
        <option value="12">12</option>
      </select>

      <div class="options">
        <label><input type="checkbox" name="uppercase"> Include Uppercase</label>
        <label><input type="checkbox" name="digit"> Include Numbers</label>
        <label><input type="checkbox" name="symbol"> Include Symbols</label>
      </div>

      <button type="submit">Generate Password</button>

    </form>

    <div class="footer">
      Built with Django 🚀
    </div>
  </div>

</body>
</html>
