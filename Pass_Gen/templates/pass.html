<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Your Password</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e1e2f, #2c2c54);
    }

    .card {
      background: white;
      padding: 40px;
      width: 420px;
      border-radius: 15px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #333;
    }

    .password-box {
      background: #f1f3f6;
      padding: 15px;
      border-radius: 10px;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 25px;
      word-break: break-all;
    }

    button {
      padding: 10px 25px;
      border: none;
      border-radius: 25px;
      background: #4b7bec;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s;
      margin: 5px;
    }

    button:hover {
      background: #3867d6;
      transform: scale(1.05);
    }

    .copy-btn {
      background: #20bf6b;
    }

    .copy-btn:hover {
      background: #0fb85a;
    }

  </style>
</head>

<body>

  <div class="card">
    <h2>🔐 Your Generated Password</h2>

    <div class="password-box" id="password">
      {{ password }}
    </div>

    <button class="copy-btn" onclick="copyPassword()">Copy</button>
    <a href="{% url 'home' %}">
      <button>Generate Again</button>
    </a>
  </div>

  <script>
    function copyPassword() {
      const passwordText = document.getElementById("password").innerText;
      navigator.clipboard.writeText(passwordText);
      alert("Password Copied!");
    }
  </script>

</body>
</html>
